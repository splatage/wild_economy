categories:
  vip:
    display-name: "VIP"
    icon: TOTEM_OF_UNDYING
    slot: 10
    visibility-when-unmet: HIDE
    locked-message: "Support the server to unlock this section."
    requirements:
      all-of:
        - type: PERMISSION
          node: "wild.store.vip"

  ranks:
    display-name: "Ranks"
    icon: NETHER_STAR
    slot: 11

  cosmetics:
    display-name: "Cosmetics"
    icon: GLOW_ITEM_FRAME
    slot: 12

  perks:
    display-name: "Perks"
    icon: BEACON
    slot: 13

  tools:
    display-name: "Tools"
    icon: DIAMOND_PICKAXE
    slot: 14

  xp_bottles:
    display-name: "XP Bottles"
    icon: EXPERIENCE_BOTTLE
    slot: 15

products:
  vip_rank:
    category: vip
    type: PERMANENT_UNLOCK
    display-name: "&6VIP"
    icon: GOLD_INGOT
    price: 25000.00
    entitlement-key: "rank.vip"
    confirm: true
    visibility-when-unmet: SHOW_LOCKED
    locked-message: "Work toward server support access to unlock this reward tier."
    actions:
      - type: CONSOLE_COMMAND
        command: "lp user {player} parent add vip"
      - type: MESSAGE
        message: "&aYou unlocked VIP!"

  builder_wand:
    category: tools
    type: REPEATABLE_GRANT
    display-name: "&bBuilder Wand"
    icon: BLAZE_ROD
    price: 5000.00
    confirm: true
    actions:
      - type: CONSOLE_COMMAND
        command: "customtools givewand {player}"
      - type: MESSAGE
        message: "&aYour Builder Wand has been delivered."

  small_xp_bottle:
    category: xp_bottles
    type: XP_WITHDRAWAL
    display-name: "&aSmall XP Bottle"
    icon: EXPERIENCE_BOTTLE
    xp-points: 100
    confirm: false

  medium_xp_bottle:
    category: xp_bottles
    type: XP_WITHDRAWAL
    display-name: "&eMedium XP Bottle"
    icon: EXPERIENCE_BOTTLE
    xp-points: 500
    confirm: true

  large_xp_bottle:
    category: xp_bottles
    type: XP_WITHDRAWAL
    display-name: "&6Large XP Bottle"
    icon: EXPERIENCE_BOTTLE
    xp-points: 1500
    confirm: true


  nether_traveler:
    category: perks
    type: PERMANENT_UNLOCK
    display-name: "&5Nether Traveler"
    icon: CRYING_OBSIDIAN
    price: 12000.00
    entitlement-key: "perk.nether_traveler"
    confirm: true
    visibility-when-unmet: SHOW_LOCKED
    locked-message: "Reach the Nether to unlock this path."
    requirements:
      all-of:
        - type: ADVANCEMENT
          advancement: "minecraft:story/enter_the_nether"
    actions:
      - type: MESSAGE
        message: "&5You unlocked Nether Traveler!"

  builder_path_1:
    category: perks
    type: PERMANENT_UNLOCK
    display-name: "&bBuilder Path I"
    icon: BRICKS
    price: 8000.00
    entitlement-key: "builder.1"
    confirm: true
    visibility-when-unmet: SHOW_LOCKED
    locked-message: "Keep building to unlock this path."
    requirements:
      all-of:
        - type: CUSTOM_COUNTER
          counter: "blocks_placed"
          min: 500
    actions:
      - type: MESSAGE
        message: "&bYou unlocked Builder Path I!"
