# wild_economy main configuration
#
# The current v1 focus is a fast Exchange-first economy with:
# - GUI-driven buying
# - command-driven selling
# - memory-first live stock with async persistence
# - soft stock caps as pricing anchors
#
# Buy delivery behavior:
# When a player purchases items, the plugin will try enabled delivery targets
# in the configured priority order below:
#   1. held shulker
#   2. looked-at container
#   3. player inventory
#   4. drop at feet
#
# Any disabled step is skipped.
# If the full purchase cannot be delivered across the enabled targets,
# the undelivered remainder is refunded.

turnover:
  # How often automated stock turnover runs, in ticks.
  interval-ticks: 72000

gui:
  page-size: 45
  title-root: "Shop"
  title-browse-prefix: "Shop - "
  title-detail-prefix: "Buy - "

commands:
  base-command: shop
  admin-command: shopadmin

logging:
  debug: false

buy-delivery:
  # Try to insert purchased items into a shulker box held in the player's main hand.
  use-held-shulker: false

  # Try to insert purchased items into a supported looked-at placed container.
  # Current supported targets are chest, barrel, and placed shulker box.
  use-looked-at-container: false

  # Try to insert purchased items into the player's normal inventory.
  use-player-inventory: true

  # Last-resort fallback: drop undelivered purchased items at the player's feet.
  drop-at-feet: false
