# Title settings
#
# The chooser lets players either use their default title placeholder or override it
# with another title they have already earned.
#
# Resolution order for %wildeco_title%:
# 1. selected earned title, if still eligible
# 2. default-title-placeholder expanded for the player
# 3. blank
#
# Relic titles are entitlement-only and hidden until earned.
# The old ConditionalTextPlaceholders splatage-member-rank ladder is superseded by %wildeco_title%.
default-title-placeholder: '%vault_group%'
titles:
  stormbound_galefoot:
    display-name: Stormbound I — Galefoot
    title-text: Galefoot
    icon: DIAMOND_BOOTS
