rules:
  - id: always-available-landscape
    match:
      item-keys:
        - "minecraft:oak_log"
        - "minecraft:spruce_log"
        - "minecraft:birch_log"
        - "minecraft:jungle_log"
        - "minecraft:acacia_log"
        - "minecraft:dark_oak_log"
        - "minecraft:mangrove_log"
        - "minecraft:cherry_log"
        - "minecraft:pale_oak_log"
        - "minecraft:crimson_stem"
        - "minecraft:warped_stem"
        - "minecraft:dirt"
        - "minecraft:coarse_dirt"
        - "minecraft:rooted_dirt"
        - "minecraft:grass_block"
        - "minecraft:podzol"
        - "minecraft:mycelium"
        - "minecraft:sand"
        - "minecraft:red_sand"
        - "minecraft:packed_ice"
    set:
      policy: ALWAYS_AVAILABLE
      stock-profile: unlimited_buy_utility
      eco-envelope: world_damage_unlimited_buy
      note: "Unlimited-buy landscape-protection material."

  - id: progression-guarded
    match:
      item-keys:
        - "minecraft:ancient_debris"
        - "minecraft:beacon"
        - "minecraft:diamond"
        - "minecraft:diamond_block"
        - "minecraft:elytra"
        - "minecraft:enchanted_book"
        - "minecraft:netherite_ingot"
        - "minecraft:netherite_upgrade_smithing_template"
        - "minecraft:ominous_trial_key"
        - "minecraft:shulker_box"
        - "minecraft:shulker_shell"
        - "minecraft:totem_of_undying"
        - "minecraft:trial_key"
      item-key-patterns:
        - "minecraft:diamond_*"
        - "minecraft:netherite_*"
    set:
      policy: EXCHANGE
      stock-profile: progression_guarded
      eco-envelope: progression_guarded
      note: "High-progression items stay expensive to buy and taper hard on sell."

  - id: prestige-loot
    match:
      item-key-patterns:
        - "minecraft:*_armor_trim_smithing_template"
        - "minecraft:music_disc_*"
        - "minecraft:*_banner_pattern"
      item-keys:
        - "minecraft:disc_fragment_5"
        - "minecraft:dragon_egg"
        - "minecraft:dragon_head"
    set:
      policy: EXCHANGE
      stock-profile: loot_prestige
      eco-envelope: loot_prestige
      note: "Rare exploration and prestige loot uses a premium market envelope."

  - id: farm-bulk-aggressive
    match:
      item-keys:
        - "minecraft:arrow"
        - "minecraft:bamboo"
        - "minecraft:beetroot"
        - "minecraft:beetroot_seeds"
        - "minecraft:bone"
        - "minecraft:cactus"
        - "minecraft:carrot"
        - "minecraft:dried_kelp"
        - "minecraft:ender_pearl"
        - "minecraft:glow_berries"
        - "minecraft:glow_ink_sac"
        - "minecraft:gunpowder"
        - "minecraft:ink_sac"
        - "minecraft:kelp"
        - "minecraft:melon_slice"
        - "minecraft:potato"
        - "minecraft:prismarine_crystals"
        - "minecraft:prismarine_shard"
        - "minecraft:pumpkin"
        - "minecraft:rotten_flesh"
        - "minecraft:slime_ball"
        - "minecraft:spider_eye"
        - "minecraft:string"
        - "minecraft:sugar_cane"
        - "minecraft:sweet_berries"
        - "minecraft:wheat"
        - "minecraft:wheat_seeds"
    set:
      policy: EXCHANGE
      stock-profile: farm_bulk_aggressive
      eco-envelope: farm_bulk_aggressive
      note: "High-rate farmables taper hard to moderate eco spam from industrial output."

  - id: disable-spawn-eggs
    match:
      item-key-patterns:
        - "minecraft:*_spawn_egg"
    set:
      policy: DISABLED
      stock-profile: disabled_placeholder
      eco-envelope: disabled_placeholder
      note: "Spawn eggs are disabled from the exchange."

  - id: default-exchange
    match: {}
    set:
      policy: EXCHANGE
      stock-profile: exchange_default
      eco-envelope: exchange_default
      note: "Default exchange assignment."
